import { BasicTracerProvider, SimpleSpanProcessor } from '@opentelemetry/sdk-trace-base';
import { Resource } from '@opentelemetry/resources';

// ===================== OpenTelemetry setup =====================

class LiveSpanProcessor {
  constructor(onStart, onEnd) { this.onStartCb = onStart; this.onEndCb = onEnd; }
  onStart(span) { this.onStartCb(span); }
  onEnd(span) { this.onEndCb(span); }
  shutdown() { return Promise.resolve(); }
  forceFlush() { return Promise.resolve(); }
}

function setupOtel(onStart, onEnd) {
  const provider = new BasicTracerProvider({
    resource: new Resource({ 'service.name': 'cts' }),
  });
  provider.addSpanProcessor(new LiveSpanProcessor(onStart, onEnd));
  provider.register();
  const tracer = provider.getTracer('cts');
  window.__ctsTracer = tracer;
  return tracer;
}

// ===================== simulation engine =====================

class IndexedDbSink {
  constructor() {
    this.dbName = 'cts-traces';
    this.storeName = 'entries';
    this.dbPromise = null;
  }
  getDb() {
    if (typeof indexedDB === 'undefined') return null;
    if (this.dbPromise) return this.dbPromise;
    this.dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(this.dbName, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(this.storeName)) {
          db.createObjectStore(this.storeName, { autoIncrement: true });
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return this.dbPromise;
  }
  append(entry) {
    const dbp = this.getDb();
    if (!dbp) return;
    dbp.then((db) => {
      const tx = db.transaction(this.storeName, 'readwrite');
      tx.objectStore(this.storeName).add(entry);
    }).catch(() => undefined);
  }
  async all() {
    const dbp = this.getDb();
    if (!dbp) return [];
    const db = await dbp;
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.storeName, 'readonly');
      const req = tx.objectStore(this.storeName).getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  }
  async clear() {
    const dbp = this.getDb();
    if (!dbp) return;
    const db = await dbp;
    return new Promise((resolve, reject) => {
      const tx = db.transaction(this.storeName, 'readwrite');
      const req = tx.objectStore(this.storeName).clear();
      req.onsuccess = () => resolve();
      req.onerror = () => reject(req.error);
    });
  }
}

class TraceLog {
  constructor() {
    this.entries = [];
    this.listeners = [];
    this.sink = undefined;
    this.otelSpans = [];
    this.otelById = new Map();
    this.otelEvents = [];
  }
  setSink(sink) { this.sink = sink; }
  getSink() { return this.sink; }
  record(entry) {
    this.entries.push(entry);
    if (this.sink) this.sink.append(entry);
    for (const l of this.listeners) l(entry);
  }
  recordOtelStart(span) {
    const sc = span.spanContext();
    const parentSpanId = span.parentSpanId ?? span.parentSpanContext?.spanId;
    const entry = {
      kind: 'otel',
      traceId: sc.traceId,
      spanId: sc.spanId,
      parentSpanId,
      name: span.name,
      startTimeMs: span.startTime ? span.startTime[0] * 1000 + span.startTime[1] / 1e6 : Date.now(),
      endTimeMs: null,
      attributes: { ...(span.attributes ?? {}) },
      status: 'pending',
      order: this.otelSpans.length,
    };
    this.otelById.set(sc.spanId, entry);
    this.otelSpans.push(entry);
    this.entries.push(entry);
    this.otelEvents.push({ type: 'start', spanId: sc.spanId, timeMs: entry.startTimeMs });
    if (this.sink) this.sink.append({ ...entry, event: 'start' });
    for (const l of this.listeners) l(entry);
  }
  recordOtelEnd(span) {
    const sc = span.spanContext();
    const existing = this.otelById.get(sc.spanId);
    const endTimeMs = span.endTime ? span.endTime[0] * 1000 + span.endTime[1] / 1e6 : Date.now();
    const status = span.status?.code === SpanStatusCode.ERROR ? 'error' : 'ok';
    const attributes = { ...(span.attributes ?? {}) };
    if (existing) {
      existing.endTimeMs = endTimeMs;
      existing.status = status;
      existing.attributes = attributes;
    }
    this.otelEvents.push({ type: 'end', spanId: sc.spanId, timeMs: endTimeMs });
    if (this.sink) this.sink.append({ kind: 'otel', event: 'end', spanId: sc.spanId, endTimeMs, status, attributes });
    for (const l of this.listeners) l(existing);
  }
  all() { return this.entries.slice(); }
  otel() { return this.otelSpans.slice(); }
  events() { return this.otelEvents.slice(); }
  subscribe(listener) { this.listeners.push(listener); }
}

class Service {
  constructor(name) {
    this.name = name;
    this.state = {};
  }
  attach(sim) { this.sim = sim; }
  getState() { return { ...this.state }; }
  setState(next) {
    this.state = { ...this.state, ...next };
    this.sim.trace.record({ kind: 'state', at: this.sim.now(), service: this.name, state: this.getState() });
  }
  send(to, type, payload, traceId, parentSpanId) {
    const ctx = this.sim.currentContext();
    const tid = traceId ?? ctx?.traceId ?? this.sim.newTraceId();
    const parent = parentSpanId ?? ctx?.spanId;
    this.sim.send({
      traceId: tid,
      spanId: this.sim.newSpanId(),
      parentSpanId: parent,
      from: this.name, to, type, payload,
    });
  }
  handle(_message) {}
}

class Simulation {
  constructor() {
    this.trace = new TraceLog();
    this.services = new Map();
    this.queue = [];
    this.clock = 0;
    this.traceCounter = 0;
    this.spanCounter = 0;
    this.queueListeners = [];
    this.drainScheduled = false;
    this.handlingStack = [];
    this.tracer = null;
    this.pendingExchanges = new Map();
  }
  tick() { this.clock += 1; }
  register(service) {
    service.attach(this);
    this.services.set(service.name, service);
  }
  get(name) {
    const service = this.services.get(name);
    if (!service) throw new Error(`Unknown service: ${name}`);
    return service;
  }
  serviceNames() { return Array.from(this.services.keys()); }
  now() { return this.clock; }
  newTraceId() { this.traceCounter += 1; return `t${this.traceCounter}`; }
  newSpanId() { this.spanCounter += 1; return `s${this.spanCounter}`; }
  currentContext() { return this.handlingStack[this.handlingStack.length - 1]; }
  send(message) {
    this.clock += 1;
    this.trace.record({
      kind: 'send', at: this.clock,
      traceId: message.traceId, spanId: message.spanId, parentSpanId: message.parentSpanId,
      from: message.from, to: message.to, type: message.type, payload: message.payload,
    });
    this.queue.push(message);
    this.emitQueue();
  }
  onQueueChange(listener) { this.queueListeners.push(listener); }
  emitQueue() {
    const snapshot = this.queue.slice();
    for (const l of this.queueListeners) l(snapshot);
  }
  step() {
    const message = this.queue.shift();
    if (!message) return false;
    this.emitQueue();
    this.clock += 1;
    const target = this.services.get(message.to);
    if (!target) {
      this.trace.record({ kind: 'error', at: this.clock, traceId: message.traceId, error: `No service: ${message.to}` });
      return true;
    }
    const startedAt = this.clock;
    this.trace.record({
      kind: 'handle', at: startedAt,
      traceId: message.traceId, spanId: message.spanId, parentSpanId: message.parentSpanId,
      service: message.to, type: message.type, payload: message.payload,
    });
    this.handlingStack.push({ traceId: message.traceId, spanId: message.spanId });
    try {
      target.handle(message);
      this.trace.record({
        kind: 'span', traceId: message.traceId, spanId: message.spanId, parentSpanId: message.parentSpanId,
        name: `${message.to}.handle ${message.type}`, service: message.to, spanKind: 'handle',
        startedAt, endedAt: this.clock,
        attributes: { messageType: message.type, from: message.from }, status: 'ok',
      });
    } catch (error) {
      const err = error instanceof Error ? error.message : String(error);
      this.trace.record({ kind: 'error', at: this.clock, traceId: message.traceId, spanId: message.spanId, service: message.to, error: err });
      this.trace.record({
        kind: 'span', traceId: message.traceId, spanId: message.spanId, parentSpanId: message.parentSpanId,
        name: `${message.to}.handle ${message.type}`, service: message.to, spanKind: 'handle',
        startedAt, endedAt: this.clock,
        attributes: { messageType: message.type, from: message.from }, status: 'error', error: err,
      });
    } finally {
      this.handlingStack.pop();
    }
    return true;
  }
  drain(maxSteps = 1000) {
    let n = 0;
    while (this.step()) {
      n += 1;
      if (n >= maxSteps) break;
    }
  }
  scheduleDrain() {
    if (this.drainScheduled) return;
    this.drainScheduled = true;
    queueMicrotask(() => { this.drainScheduled = false; this.drain(); });
  }
  startSpan(opts) {
    const ctx = this.currentContext();
    const traceId = opts.traceId ?? ctx?.traceId ?? this.newTraceId();
    const parentSpanId = opts.parentSpanId ?? ctx?.spanId;
    const spanId = this.newSpanId();
    const startedAt = this.now();
    const base = { ...(opts.attributes ?? {}) };
    return {
      spanId, traceId,
      end: ({ status, error, attributes }) => {
        const endedAt = this.now();
        this.trace.record({
          kind: 'span', traceId, spanId, parentSpanId,
          name: opts.name, service: opts.service, spanKind: opts.spanKind,
          startedAt, endedAt,
          attributes: { ...base, ...(attributes ?? {}) },
          status, error,
        });
      },
    };
  }
}

class UserService extends Service {
  constructor() {
    super('User');
  }
  runGame({ target, seedPrompt, turns }) {
    const tracer = this.sim.tracer;
    const gameSpan = tracer.startSpan('cts.game', { attributes: { 'cts.target': target, 'cts.seedPrompt': seedPrompt, 'cts.turns': turns } });
    const gameCtx = otelTrace.setSpan(otelContext.active(), gameSpan);
    this.setState({ target, seedPrompt, turns, transcript: [], turnIdx: 0, gameSpan, gameCtx, status: 'running' });
    this.startTurn();
  }
  startTurn() {
    const { turnIdx, turns, transcript, seedPrompt, gameCtx } = this.state;
    if (turnIdx >= turns) return;
    const tracer = this.sim.tracer;
    const turnSpan = tracer.startSpan(`cts.turn`, { attributes: { 'cts.turnIdx': turnIdx } }, gameCtx);
    const turnCtx = otelTrace.setSpan(gameCtx, turnSpan);
    const exchangeSpan = tracer.startSpan('chat.exchange', { attributes: { 'cts.turnIdx': turnIdx } }, turnCtx);
    const exchangeCtx = otelTrace.setSpan(turnCtx, exchangeSpan);
    const sendSpan = tracer.startSpan('chat.send', { attributes: { 'chat.from': 'User', 'chat.to': 'LLM' } }, exchangeCtx);
    sendSpan.end();
    this.send('LLM', 'turn', { seedPrompt, transcript, turnIdx, exchangeCtx, exchangeSpan, turnSpan });
  }
  handle(message) {
    if (message.type === 'turn_result') {
      const { text, turnSpan } = message.payload;
      const transcript = [...(this.state.transcript ?? []), text];
      turnSpan.setAttribute('cts.output', text);
      turnSpan.end();
      const nextIdx = this.state.turnIdx + 1;
      this.setState({ transcript, turnIdx: nextIdx });
      if (nextIdx >= this.state.turns) {
        this.state.gameSpan.setAttribute('cts.outcome', 'loss');
        this.state.gameSpan.end();
        this.setState({ status: 'loss' });
      } else {
        this.startTurn();
      }
    }
  }
}

class LLMService extends Service {
  constructor() {
    super('LLM');
  }
  handle(message) {
    if (message.type === 'turn') {
      const { seedPrompt, transcript, turnIdx, exchangeCtx, exchangeSpan, turnSpan } = message.payload;
      this.callLlm({ seedPrompt, transcript, turnIdx, traceId: message.traceId, exchangeCtx, exchangeSpan, turnSpan });
    }
  }

  callLlm({ seedPrompt, transcript, turnIdx, traceId, exchangeCtx, exchangeSpan, turnSpan }) {
    const apiKey = window.VITE_OPENAI_API_KEY || '';
    const openai = createOpenAI({ apiKey });
    const messages = [
      { role: 'system', content: seedPrompt },
      ...transcript.map((t) => ({ role: 'assistant', content: t })),
    ];
    const model = 'gpt-4o-mini';
    const tracer = this.sim.tracer;
    const recvSpan = tracer.startSpan('chat.receive', { attributes: { 'chat.from': 'LLM', 'chat.to': 'User', 'cts.turnIdx': turnIdx, 'chat.transcriptLength': transcript.length } }, exchangeCtx);
    generateText({ model: openai(model), messages })
      .then((result) => {
        recvSpan.setAttribute('chat.message', result.text);
        exchangeSpan.setAttribute('chat.response', result.text);
        recvSpan.end();
        exchangeSpan.end();
        this.send('User', 'turn_result', { text: result.text, turnSpan }, traceId);
        this.sim.scheduleDrain();
      })
      .catch((error) => {
        const msg = error instanceof Error ? error.message : String(error);
        recvSpan.setAttribute('chat.error', msg);
        recvSpan.setStatus({ code: SpanStatusCode.ERROR, message: msg });
        recvSpan.end();
        exchangeSpan.setStatus({ code: SpanStatusCode.ERROR, message: msg });
        exchangeSpan.end();
        turnSpan.setStatus({ code: SpanStatusCode.ERROR, message: msg });
        this.send('User', 'turn_result', { text: `[error: ${msg}]`, turnSpan }, traceId);
        this.sim.scheduleDrain();
      });
  }
}

function buildSimulation() {
  const sim = new Simulation();
  sim.trace.setSink(new IndexedDbSink());
  sim.tracer = setupOtel(
    (span) => sim.trace.recordOtelStart(span),
    (span) => sim.trace.recordOtelEnd(span),
  );
  sim.register(new UserService());
  sim.register(new LLMService());
  return sim;
}

// ===================== React UI =====================

function useSim() {
  const [sim] = useState(() => buildSimulation());
  const [trace, setTrace] = useState(() => sim.trace.all());
  const [queue, setQueue] = useState([]);

  useEffect(() => {
    sim.trace.subscribe(() => setTrace(sim.trace.all()));
    sim.onQueueChange((q) => setQueue(q));
  }, [sim]);

  const reset = useCallback(() => { window.location.reload(); }, []);

  return { sim, trace, queue, reset };
}

function badgeStyle(kind) {
  const base = badgeBaseClass;
  switch (kind) {
    case 'send': return `${base} ${css`background: var(--primary-soft); color: var(--primary-ink);`}`;
    case 'handle': return `${base} ${css`background: var(--good-soft); color: var(--good);`}`;
    case 'state': return `${base} ${css`background: var(--warn-soft); color: var(--warn-ink);`}`;
    case 'error': return `${base} ${css`background: var(--warn-soft); color: var(--warn-ink);`}`;
    case 'span': return `${base} ${css`background: var(--mute-soft); color: var(--ink-2);`}`;
    default: return `${base} ${css`background: var(--mute-soft); color: var(--ink-3);`}`;
  }
}

function formatEntry(entry) {
  if (entry.kind === 'send') return `${entry.from} -> ${entry.to} : ${entry.type} ${JSON.stringify(entry.payload)}`;
  if (entry.kind === 'handle') return `${entry.service} handled ${entry.type} ${JSON.stringify(entry.payload)}`;
  if (entry.kind === 'state') return JSON.stringify(entry.state);
  if (entry.kind === 'error') return entry.error;
  if (entry.kind === 'span') return `${entry.name} [${entry.spanKind}] ${entry.status}${entry.error ? ` ${entry.error}` : ''} ${JSON.stringify(entry.attributes)}`;
  return '';
}

const servicePairs = [
  { a: 'User', b: 'LLM', bidirectional: true, sideA: Position.Right, sideB: Position.Left },
];

function portsForService(name) {
  const ports = [];
  for (const pair of servicePairs) {
    if (pair.a === name) ports.push({ peer: pair.b, side: pair.sideA });
    else if (pair.b === name) ports.push({ peer: pair.a, side: pair.sideB });
  }
  return ports;
}

function portId(peer) { return `port:${peer}`; }

function ServiceNode({ data }) {
  const sideCounts = {
    [Position.Top]: 0,
    [Position.Bottom]: 0,
    [Position.Left]: 0,
    [Position.Right]: 0,
  };
  for (const p of data.ports) sideCounts[p.side] += 1;
  const sideIndex = {
    [Position.Top]: 0,
    [Position.Bottom]: 0,
    [Position.Left]: 0,
    [Position.Right]: 0,
  };
  return (
    <div className={`${nodeCardClass} ${data.active ? nodeCardActiveClass : ''}`} style={{ position: 'relative' }}>
      <div className={roleClass}>{data.role}</div>
      <div>{data.name}</div>
      {data.ports.map((port) => {
        const total = sideCounts[port.side];
        const idx = sideIndex[port.side];
        sideIndex[port.side] = idx + 1;
        const offsetPct = ((idx + 1) / (total + 1)) * 100;
        const isVertical = port.side === Position.Top || port.side === Position.Bottom;
        const positionStyle = isVertical ? { left: `${offsetPct}%` } : { top: `${offsetPct}%` };
        const dotStyle = { ...positionStyle, width: 7, height: 7, background: 'var(--ink-4)', border: 'none' };
        const overlayStyle = { ...positionStyle, width: 7, height: 7, background: 'transparent', border: 'none', opacity: 0 };
        const id = portId(port.peer);
        return (
          <React.Fragment key={`${port.peer}-${port.side}`}>
            <Handle id={id} type="source" position={port.side} style={dotStyle} isConnectable={false} />
            <Handle id={id} type="target" position={port.side} style={overlayStyle} isConnectable={false} />
          </React.Fragment>
        );
      })}
    </div>
  );
}

function mostRecentTraceOnly(trace) {
  let lastTraceId;
  for (let i = trace.length - 1; i >= 0; i -= 1) {
    const e = trace[i];
    if ('traceId' in e && e.traceId) { lastTraceId = e.traceId; break; }
  }
  if (!lastTraceId) return [];
  return trace.filter((e) => 'traceId' in e && e.traceId === lastTraceId);
}

function FlowPanel({ sim, trace, stepIdx, setStepIdx }) {
  const names = sim.serviceNames();
  const allOtel = useMemo(() => trace.filter((e) => e.kind === 'otel'), [trace]);
  const scopedSpans = useMemo(() => {
    if (allOtel.length === 0) return allOtel;
    const lastTraceId = allOtel[allOtel.length - 1].traceId;
    return allOtel.filter((s) => s.traceId === lastTraceId);
  }, [allOtel]);
  const spanEvents = useMemo(() => {
    const evs = [];
    for (const s of scopedSpans) {
      evs.push({ type: 'start', span: s, timeMs: s.startTimeMs });
      if (s.endTimeMs != null) evs.push({ type: 'end', span: s, timeMs: s.endTimeMs });
    }
    evs.sort((a, b) => {
      if (a.timeMs !== b.timeMs) return a.timeMs - b.timeMs;
      if (a.type !== b.type) return a.type === 'start' ? -1 : 1;
      if (a.type === 'start') return a.span.order - b.span.order;
      return b.span.order - a.span.order;
    });
    return evs;
  }, [scopedSpans]);

  useEffect(() => { setStepIdx(spanEvents.length - 1); }, [spanEvents.length, setStepIdx]);

  const currentEvent = stepIdx >= 0 && stepIdx < spanEvents.length ? spanEvents[stepIdx] : null;
  const currentSpan = currentEvent?.span ?? null;
  const fromName = currentSpan?.attributes?.['chat.from'];
  const toName = currentSpan?.attributes?.['chat.to'];
  const activeName = currentSpan && fromName && toName ? toName : null;
  const currentSend = currentSpan && fromName && toName ? { from: fromName, to: toName, type: currentSpan.name, at: currentEvent.timeMs } : null;
  const positions = {
    User: { x: 40, y: 120 },
    LLM: { x: 320, y: 120 },
  };
  const roles = {
    User: 'P1',
    LLM: 'P2',
  };

  const nodes = names.map((name) => {
    const ports = portsForService(name);
    return {
      id: name,
      type: 'service',
      position: positions[name] ?? { x: 0, y: 0 },
      data: {
        name,
        role: roles[name] ?? 'SERVICE',
        active: name === activeName,
        ports,
      },
      style: { background: 'transparent', border: 'none', padding: 0, width: 'auto' },
    };
  });

  const primaryColor = 'oklch(56% 0.15 262)';
  const inkColor = 'oklch(22% 0.015 260)';
  const surfaceColor = 'oklch(100% 0 0)';
  const muteColor = 'oklch(72% 0.008 260)';

  const edges = [];
  for (const pair of servicePairs) {
    const matchesAtoB = !!(currentSend && currentSend.from === pair.a && currentSend.to === pair.b);
    const matchesBtoA = !!(currentSend && currentSend.from === pair.b && currentSend.to === pair.a);
    const isActive = matchesAtoB || matchesBtoA;
    const stroke = isActive ? primaryColor : muteColor;
    edges.push({
      id: `${pair.a}<->${pair.b}`,
      source: pair.a,
      target: pair.b,
      sourceHandle: portId(pair.b),
      targetHandle: portId(pair.a),
      type: pair.edgeType ?? 'smoothstep',
      label: isActive && currentSend ? currentSend.type : undefined,
      animated: false,
      className: isActive ? (matchesBtoA ? activeEdgeReverseClass : activeEdgeForwardClass) : undefined,
      markerEnd: { type: MarkerType.ArrowClosed, color: matchesAtoB ? primaryColor : muteColor },
      markerStart: pair.bidirectional ? { type: MarkerType.ArrowClosed, color: matchesBtoA ? primaryColor : muteColor } : undefined,
      style: { stroke, strokeWidth: 1.5 },
      labelStyle: { fill: inkColor, fontSize: 11, fontFamily: 'var(--font-mono)' },
      labelBgStyle: { fill: surfaceColor },
    });
  }

  const headerClass = css`
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--surface);
    font-size: 12px;
    color: var(--ink-2);
  `;
  const sliderClass = css`
    flex: 1;
    accent-color: var(--primary);
  `;
  const stepLabelClass = css`
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--ink-3);
    width: 220px;
    flex-shrink: 0;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  `;

  return (
    <Panel title="Service Flow" bodyStyle={{ display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div className={headerClass}>
        <span>Step</span>
        <input
          className={sliderClass}
          type="range"
          min={-1}
          max={Math.max(spanEvents.length - 1, -1)}
          step={1}
          value={stepIdx}
          onChange={(e) => setStepIdx(Number(e.target.value))}
          disabled={spanEvents.length === 0}
        />
        <span className={stepLabelClass}>
          {currentEvent ? `${currentEvent.type} ${currentEvent.span.name}${currentSend ? ` ${currentSend.from}→${currentSend.to}` : ''}` : spanEvents.length === 0 ? 'no spans' : 'start'}
        </span>
      </div>
      <div style={{ flex: 1, minHeight: 0, width: '100%', background: 'var(--surface-alt)' }}>
        <ReactFlow
          nodes={nodes}
          edges={edges}
          nodeTypes={nodeTypes}
          fitView
          nodesDraggable={false}
          nodesConnectable={false}
          elementsSelectable={false}
          panOnDrag
          zoomOnScroll
        >
          <Background variant={BackgroundVariant.Dots} color="oklch(84% 0.008 250)" gap={16} size={1.5} />
          <Controls showInteractive={false} />
        </ReactFlow>
      </div>
    </Panel>
  );
}

function buildSpanTree(spans) {
  const ids = new Set(spans.map((s) => s.spanId));
  const byParent = new Map();
  const roots = [];
  const sorted = spans.slice().sort((a, b) => a.startTimeMs - b.startTimeMs || a.order - b.order);
  for (const s of sorted) {
    const parentPresent = s.parentSpanId && ids.has(s.parentSpanId);
    if (!parentPresent) roots.push(s);
    else {
      if (!byParent.has(s.parentSpanId)) byParent.set(s.parentSpanId, []);
      byParent.get(s.parentSpanId).push(s);
    }
  }
  const ordered = [];
  const effectiveStatus = new Map();
  const computeStatus = (span) => {
    if (effectiveStatus.has(span.spanId)) return effectiveStatus.get(span.spanId);
    const children = byParent.get(span.spanId) ?? [];
    let status = span.status;
    for (const c of children) {
      const cs = computeStatus(c);
      if (cs === 'error') status = 'error';
    }
    effectiveStatus.set(span.spanId, status);
    return status;
  };
  const walk = (span, depth) => {
    ordered.push({ span, depth, effectiveStatus: computeStatus(span) });
    const children = byParent.get(span.spanId) ?? [];
    for (const c of children) walk(c, depth + 1);
  };
  for (const r of roots) walk(r, 0);
  return ordered;
}

function LogsPanel({ trace, showStartEnd, onToggleShowStartEnd, stepIdx }) {
  const allOtel = trace.filter((e) => e.kind === 'otel');
  let shownOtel = allOtel;
  if (allOtel.length > 0) {
    const lastTraceId = allOtel[allOtel.length - 1].traceId;
    shownOtel = allOtel.filter((s) => s.traceId === lastTraceId);
  }
  const tree = buildSpanTree(shownOtel);
  const events = useMemo(() => {
    const evs = [];
    for (const s of shownOtel) {
      evs.push({ type: 'start', span: s, timeMs: s.startTimeMs });
      if (s.endTimeMs != null) evs.push({ type: 'end', span: s, timeMs: s.endTimeMs });
    }
    evs.sort((a, b) => {
      if (a.timeMs !== b.timeMs) return a.timeMs - b.timeMs;
      if (a.type !== b.type) return a.type === 'start' ? -1 : 1;
      if (a.type === 'start') return a.span.order - b.span.order;
      return b.span.order - a.span.order;
    });
    return evs;
  }, [shownOtel]);
  const row = css`
    display: grid;
    grid-template-columns: 50px 80px 70px 60px 60px 90px 1fr;
    gap: 8px;
    padding: 6px 14px;
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--ink-2);
    border-bottom: 1px dashed var(--line);
    align-items: center;
    &:last-child { border-bottom: none; }
  `;
  const at = css`color: var(--ink-4);`;
  const dim = css`color: var(--ink-4);`;
  const empty = css`padding: 16px; color: var(--ink-3); font-style: italic; font-size: 13px;`;
  const head = css`
    display: grid;
    grid-template-columns: 50px 80px 70px 60px 60px 90px 1fr;
    gap: 8px;
    padding: 6px 14px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-3);
    border-bottom: 1px solid var(--line);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  `;
  const atOf = (e) => ('at' in e ? e.at : 'startedAt' in e ? e.startedAt : undefined);
  return (
    <Panel
      title="Trace Log"
      headerRight={
        <label style={{ display: 'inline-flex', alignItems: 'center', gap: 6, textTransform: 'none', letterSpacing: 0, fontWeight: 500 }}>
          <input type="checkbox" checked={showStartEnd} onChange={(e) => onToggleShowStartEnd(e.target.checked)} />
          show start/end
        </label>
      }
    >
      {(showStartEnd ? events.length === 0 : tree.length === 0) ? (
        <div className={empty}>No spans yet. Send a message.</div>
      ) : showStartEnd ? (
        <div style={{ padding: '8px 14px', fontFamily: 'var(--font-mono)', fontSize: 11.5, color: 'var(--ink-2)' }}>
          {events.map((ev, i) => {
            const span = ev.span;
            const traceShort = span.traceId.slice(0, 8);
            const spanShort = span.spanId.slice(0, 8);
            const attrsStr = JSON.stringify(span.attributes);
            const isEnd = ev.type === 'end';
            const color = isEnd ? (span.status === 'error' ? 'var(--warn-ink)' : 'var(--good)') : 'var(--ink-4)';
            const dur = isEnd && span.endTimeMs != null ? Math.max(0, span.endTimeMs - span.startTimeMs).toFixed(1) : null;
            const isCurrent = i === stepIdx;
            return (
              <div key={`${span.spanId}-${ev.type}-${i}`} style={{ padding: '4px 8px', margin: '0 -8px', borderBottom: '1px dashed var(--line)', background: isCurrent ? 'var(--primary-soft)' : 'transparent', borderLeft: isCurrent ? '2px solid var(--primary)' : '2px solid transparent' }}>
                <span style={{ color: 'var(--ink-4)' }}>[trace={traceShort}][span={spanShort}] </span>
                <span style={{ color, fontWeight: 600 }}>{ev.type} {span.name}</span>
                <span style={{ color: 'var(--ink-3)' }}> {attrsStr}</span>
                {isEnd && dur != null && <span style={{ color: 'var(--ink-4)' }}> ({dur}ms)</span>}
              </div>
            );
          })}
        </div>
      ) : (
        <div style={{ padding: '8px 14px', fontFamily: 'var(--font-mono)', fontSize: 11.5, color: 'var(--ink-2)' }}>
          {tree.map(({ span, depth, effectiveStatus }, i) => {
            const isPending = span.endTimeMs == null;
            const dur = isPending ? null : Math.max(0, span.endTimeMs - span.startTimeMs).toFixed(1);
            const traceShort = span.traceId.slice(0, 8);
            const spanShort = span.spanId.slice(0, 8);
            const attrsStr = JSON.stringify(span.attributes);
            const color = isPending ? 'var(--ink-4)' : effectiveStatus === 'error' ? 'var(--warn-ink)' : 'var(--good)';
            return (
              <div key={span.spanId} style={{ paddingLeft: depth * 18, padding: '4px 0', borderBottom: '1px dashed var(--line)' }}>
                <span style={{ color: 'var(--ink-4)' }}>[trace={traceShort}][span={spanShort}] </span>
                <span style={{ color, fontWeight: 600 }}>{span.name}</span>
                <span style={{ color: 'var(--ink-3)' }}> {attrsStr}</span>
                <span style={{ color: 'var(--ink-4)' }}> {isPending ? '(pending)' : `(${dur}ms)`}</span>
              </div>
            );
          })}
        </div>
      )}
    </Panel>
  );
}

function CaptureTheStringPanel() {
  const proseClass = css`
    padding: 16px 18px;
    color: var(--ink);
    font-size: 13px;
    line-height: 1.55;
    p { margin: 0 0 12px 0; }
    p:last-child { margin-bottom: 0; }
  `;
  return (
    <Panel title="Capture the String">
      <div className={proseClass}>
        <p>Capture the String (CTS) is a simple LLM eval game. Following von Neumann, we start with the one-person case: a pure maximization problem with no opponent.</p>
        <p>In the single-player game, a fixed target string is chosen in advance, along with a turn budget that caps how long the game can run. A single player takes turns emitting one message per turn, and the running transcript of everything the player has said so far accumulates as the game's context. The game resolves to a payoff of either +1 or -1.</p>
        <p>Termination is straightforward: the game ends the first turn the player's message exactly matches the target (a win, payoff +1), or when the budget runs out without a match (a loss, payoff -1).</p>
        <p>To instantiate a game, you pick a concrete target, budget, and player — for example, target "hello world", budget 5, player GPT-4. That tuple alone doesn't fully specify behavior, though, since it leaves open what the player actually sees on each turn.</p>
        <p>The game engine is what fills that gap: it drives turns, decides what context the player is shown, and adjudicates termination. Open questions include whether the player sees a system prompt explaining the rules, whether it sees its own prior outputs, and how the win-check is performed (exact match, normalized, etc.).</p>
      </div>
    </Panel>
  );
}

function App() {
  const { sim, trace, reset } = useSim();
  const [showStartEnd, setShowStartEnd] = useState(false);
  const [stepIdx, setStepIdx] = useState(-1);

  const exportTrace = useCallback(async () => {
    const sink = sim.trace.getSink();
    const entries = sink ? await sink.all() : sim.trace.all();
    const ndjson = entries.map((e) => JSON.stringify(e)).join('\n');
    const blob = new Blob([ndjson], { type: 'application/x-ndjson' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `cts-trace-${Date.now()}.ndjson`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, [sim]);

  return (
    <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', background: 'var(--bg)' }}>
      <div className={topbarClass}>
        <span className={brandClass}>
          <span className={logoClass}>cts</span>
          Capture the String
        </span>
        <div style={{ display: 'flex', gap: 8 }}>
          <Button onClick={exportTrace}>Export trace</Button>
          <Button onClick={reset}>Reset</Button>
        </div>
      </div>
      <div className={gridClass}>
        <div style={{ gridRow: '1 / 2', gridColumn: '1 / 2', minHeight: 0 }}>
          <GamePanel sim={sim} trace={trace} />
        </div>
        <div style={{ gridRow: '1 / 2', gridColumn: '2 / 3', minHeight: 0 }}>
          <FlowPanel sim={sim} trace={trace} stepIdx={stepIdx} setStepIdx={setStepIdx} />
        </div>
        <div style={{ gridRow: '1 / 2', gridColumn: '3 / 4', minHeight: 0 }}>
          <CaptureTheStringPanel />
        </div>
        <div style={{ gridRow: '2 / 3', gridColumn: '1 / 4', minHeight: 0 }}>
          <LogsPanel trace={trace} showStartEnd={showStartEnd} onToggleShowStartEnd={setShowStartEnd} stepIdx={stepIdx} />
        </div>
      </div>
    </div>
  );
}
